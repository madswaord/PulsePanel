<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulsePanel</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(15, 22, 40, 0.78);
      --panel-border: rgba(83, 173, 255, 0.18);
      --text: #eef4ff;
      --muted: #8ea3c7;
      --cyan: #00e5ff;
      --purple: #7c4dff;
      --green: #00ffb3;
      --orange: #ff9f43;
      --red: #ff4d6d;
      --grid-line: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(124,77,255,0.22), transparent 25%),
        radial-gradient(circle at top left, rgba(0,229,255,0.18), transparent 25%),
        linear-gradient(180deg, #050812 0%, #0a1020 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 1500px; margin: 0 auto; padding: 24px; }
    .topbar { display:flex; justify-content:space-between; align-items:end; margin-bottom:24px; }
    .brand h1 { margin:0; font-size:40px; letter-spacing:0.04em; }
    .brand p { margin:8px 0 0; color:var(--muted); }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 16px var(--green); display:inline-block; margin-right:8px; }
    .grid-top { display:grid; grid-template-columns: repeat(6, 1fr); gap:16px; margin-bottom:16px; }
    .grid-main { display:grid; grid-template-columns: 2fr 1.2fr; gap:16px; margin-bottom:16px; }
    .grid-bottom { display:grid; grid-template-columns: 1.2fr 1fr 1fr; gap:16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 18px;
    }
    .panel h3 { margin:0 0 12px; font-size:14px; text-transform:uppercase; color:var(--muted); letter-spacing:0.12em; }
    .metric { font-size:34px; font-weight:800; }
    .sub { color: var(--muted); font-size: 13px; }
    .list { display:flex; flex-direction:column; gap:10px; }
    .row { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-radius:14px; background: rgba(255,255,255,0.03); }
    .row small { display:block; color:var(--muted); margin-top:4px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .tag { padding:4px 8px; border-radius:999px; background:rgba(0,229,255,0.08); color:var(--cyan); font-size:12px; }
    .tag.warn { background:rgba(255,159,67,0.12); color:var(--orange); }
    .tag.ok { background:rgba(0,255,179,0.10); color:var(--green); }
    .tag.err { background:rgba(255,77,109,0.10); color:var(--red); }
    .tag.dim { background:rgba(255,255,255,0.07); color:#cbd6ec; }
    .system-banner {
      margin-bottom: 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px 18px;
      border-radius:18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .system-banner-top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .system-banner strong { font-size: 14px; letter-spacing: .08em; text-transform: uppercase; }
    .banner-notes { display:flex; flex-direction:column; gap:8px; }
    .banner-note { padding:10px 12px; border-radius:12px; font-size:13px; }
    .banner-note.warn { background:rgba(255,159,67,0.10); color:var(--orange); }
    .banner-note.err { background:rgba(255,77,109,0.10); color:var(--red); }
    .chart-wrap { height: 280px; display:flex; flex-direction:column; gap:10px; }
    .chart-meta { display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:13px; }
    .chart-meta strong { color: var(--text); font-size: 16px; }
    .chart-box {
      position: relative;
      height: 230px;
      border:1px dashed rgba(255,255,255,0.08);
      border-radius:16px;
      overflow:hidden;
      background:
        linear-gradient(to bottom, transparent 24%, var(--grid-line) 25%, transparent 26%),
        linear-gradient(to right, transparent 24%, var(--grid-line) 25%, transparent 26%);
      background-size: 100% 56px, 80px 100%;
    }
    canvas { width: 100%; height: 100%; display:block; }
    .legend { display:flex; gap:14px; align-items:center; }
    .legend span { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    .dot.cyan { background:var(--cyan); box-shadow:0 0 12px var(--cyan); }
    .dot.purple { background:var(--purple); box-shadow:0 0 12px var(--purple); }
    .dot.red { background:var(--red); box-shadow:0 0 12px var(--red); }
    .section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .section-head .metric-mini { font-size:24px; font-weight:800; }
    .client-card { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-radius:14px; background:rgba(255,255,255,0.03); }
    .client-main strong { display:block; }
    .client-meta { color:var(--muted); font-size:12px; margin-top:4px; }
    .health-bar { height:10px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,0.08); margin-top:8px; }
    .health-fill { height:100%; border-radius:999px; }
    .fill-cpu { background:linear-gradient(90deg, #00e5ff, #7c4dff); }
    .fill-mem { background:linear-gradient(90deg, #00ffb3, #00e5ff); }
    .fill-disk { background:linear-gradient(90deg, #ff9f43, #ff4d6d); }
    @media (max-width: 1280px) {
      .grid-top { grid-template-columns: repeat(3, 1fr); }
      .grid-main, .grid-bottom { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .grid-top { grid-template-columns: 1fr; }
      .brand h1 { font-size: 30px; }
      .topbar { flex-direction:column; align-items:start; gap:12px; }
      .system-banner-top { flex-direction: column; align-items: start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1 id="brand-name">PulsePanel</h1>
        <p id="brand-subtitle">OPNsense 实时态势面板 · 新潮科技风网络控制台</p>
      </div>
      <div><span class="status-dot"></span><span id="clock">--</span></div>
    </div>

    <div class="system-banner">
      <div class="system-banner-top">
        <div>
          <strong>接入状态</strong>
          <div class="sub" id="integration-text">正在检查后端与 OPNsense 接入情况…</div>
        </div>
        <div id="integration-badges"></div>
      </div>
      <div class="banner-notes" id="integration-notes"></div>
    </div>

    <section class="grid-top" id="overview-cards"></section>

    <section class="grid-main">
      <div class="panel">
        <h3>WAN 流量脉冲</h3>
        <div class="chart-wrap">
          <div class="chart-meta">
            <div class="legend">
              <span><i class="dot cyan"></i>下载</span>
              <span><i class="dot purple"></i>上传</span>
            </div>
            <div><strong id="wan-chart-range">5 分钟窗口</strong></div>
          </div>
          <div class="chart-box"><canvas id="wan-canvas" width="900" height="230"></canvas></div>
        </div>
      </div>
      <div class="panel">
        <h3>防火墙态势</h3>
        <div class="chart-wrap">
          <div class="chart-meta">
            <div class="legend">
              <span><i class="dot red"></i>实时连接数</span>
            </div>
            <div><strong id="fw-current">--</strong></div>
          </div>
          <div class="chart-box"><canvas id="fw-canvas" width="500" height="230"></canvas></div>
        </div>
      </div>
    </section>

    <section class="grid-bottom">
      <div class="panel">
        <div class="section-head">
          <div>
            <h3>在线终端</h3>
            <div class="sub">当前活跃 LAN 终端</div>
          </div>
          <div class="metric-mini" id="clients-total">--</div>
        </div>
        <div class="list" id="clients-list"></div>
      </div>
      <div class="panel">
        <div class="section-head">
          <div>
            <h3>VPN 状态</h3>
            <div class="sub">远程接入与隧道在线</div>
          </div>
          <div class="metric-mini" id="vpn-total">--</div>
        </div>
        <div class="list" id="vpn-list"></div>
      </div>
      <div class="panel">
        <div class="section-head">
          <div>
            <h3>系统健康</h3>
            <div class="sub">设备资源与接入状态</div>
          </div>
          <div id="system-status-badge"></div>
        </div>
        <div class="list" id="system-list"></div>
      </div>
    </section>
  </div>

  <script src="./runtime-config.js"></script>
  <script>
    const runtimeConfig = window.PULSEPANEL_CONFIG || {};
    const API = runtimeConfig.apiBaseUrl || 'http://localhost:8710/api';
    document.getElementById('brand-name').textContent = runtimeConfig.brandName || 'PulsePanel';
    document.getElementById('brand-subtitle').textContent = runtimeConfig.brandSubtitle || 'OPNsense 实时态势面板 · 新潮科技风网络控制台';

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN');
    }
    setInterval(updateClock, 1000); updateClock();

    async function fetchJSON(path) {
      const res = await fetch(`${API}${path}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function card(title, value, sub) {
      return `<div class="panel"><h3>${title}</h3><div class="metric">${value}</div><div class="sub">${sub || ''}</div></div>`;
    }

    function badge(text, type = '') {
      return `<span class="tag ${type}">${text}</span>`;
    }

    function formatAge(seconds) {
      if (seconds == null || Number.isNaN(seconds)) return '未知';
      if (seconds < 60) return `${seconds} 秒前`;
      if (seconds < 3600) return `${Math.round(seconds / 60)} 分钟前`;
      if (seconds < 86400) return `${Math.round(seconds / 3600)} 小时前`;
      return `${Math.round(seconds / 86400)} 天前`;
    }

    function shortText(text, max = 28) {
      if (!text) return '未知设备';
      return text.length > max ? `${text.slice(0, max)}…` : text;
    }

    function peerStatusRank(status) {
      if (status === 'online') return 0;
      if (status === 'stale') return 1;
      return 2;
    }

    function drawSeries(canvas, datasets, colors) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const allValues = datasets.flatMap(d => d.map(p => p.value));
      const min = Math.min(...allValues, 0);
      const max = Math.max(...allValues, 1);
      const pad = 16;
      const innerW = w - pad * 2;
      const innerH = h - pad * 2;

      function x(index, total) {
        if (total <= 1) return pad;
        return pad + (index / (total - 1)) * innerW;
      }
      function y(value) {
        const ratio = (value - min) / (max - min || 1);
        return h - pad - ratio * innerH;
      }

      datasets.forEach((series, sidx) => {
        ctx.beginPath();
        ctx.lineWidth = 2.2;
        ctx.strokeStyle = colors[sidx];
        ctx.shadowBlur = 14;
        ctx.shadowColor = colors[sidx];
        series.forEach((point, idx) => {
          const px = x(idx, series.length);
          const py = y(point.value);
          if (idx === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;
      });
    }

    function formatSystemStatusTag(status) {
      if (status === 'reachable') return badge('已接入', 'ok');
      if (status === 'unreachable') return badge('不可达', 'err');
      if (status === 'unknown') return badge('待映射', 'dim');
      return badge('模拟中', 'warn');
    }

    function formatWanSub(wan) {
      const latency = wan.latencyMs == null ? '待映射' : `${wan.latencyMs} ms`;
      const loss = wan.packetLossPct == null ? '待映射' : `${wan.packetLossPct}%`;
      return `状态 ${wan.statusText} · 延迟 ${latency} · 丢包 ${loss}`;
    }

    async function loadIntegrationStatus() {
      const [health, capabilities] = await Promise.all([
        fetchJSON('/health'),
        fetchJSON('/capabilities')
      ]);

      const validation = capabilities.validation || health.config?.validation || {};
      const configured = health.config?.opnsense?.configured;
      const mode = capabilities.mode;
      const verifyTls = health.config?.opnsense?.verifyTls;
      const baseUrl = health.config?.opnsense?.baseUrl || '未配置';

      let text = '';
      if (mode === 'mock') {
        text = `当前运行在 Mock 模式，尚未接入真实 OPNsense。目标地址：${baseUrl}`;
      } else {
        text = `后端已进入 OPNsense 模式。目标地址：${baseUrl} · TLS 校验：${verifyTls ? '开启' : '关闭'}`;
      }

      document.getElementById('integration-text').textContent = text;
      document.getElementById('integration-badges').innerHTML = [
        badge(`模式：${mode}`, mode === 'mock' ? 'warn' : 'ok'),
        badge(configured ? '配置完整' : '配置未完成', configured ? 'ok' : 'err'),
        badge(`流量源：${capabilities.providers.traffic}`, 'warn')
      ].join(' ');

      const notes = [];
      (validation.errors || []).forEach(msg => notes.push(`<div class="banner-note err">错误：${msg}</div>`));
      (validation.warnings || []).forEach(msg => notes.push(`<div class="banner-note warn">提示：${msg}</div>`));
      document.getElementById('integration-notes').innerHTML = notes.join('');
    }

    async function loadOverview() {
      const data = await fetchJSON('/dashboard/overview');
      document.getElementById('overview-cards').innerHTML = [
        card('WAN 链路', data.wan.online ? '在线' : '离线', formatWanSub(data.wan)),
        card('总下载', data.throughput.downloadHuman, '当前下行速率'),
        card('总上传', data.throughput.uploadHuman, '当前上行速率'),
        card('防火墙', data.firewall.activeStates, `最近 1 分钟 Block ${data.firewall.blockedLastMinute}`),
        card('VPN 在线', data.vpn.totalOnline, `WG ${data.vpn.providers.wireguard} · OVPN ${data.vpn.providers.openvpn}`),
        card('DNS 脉冲', `${data.dns.qps} QPS`, data.dns.status)
      ].join('');

      const systemStatusTag = formatSystemStatusTag(data.system.status);
      document.getElementById('system-status-badge').innerHTML = systemStatusTag;
      document.getElementById('system-list').innerHTML = [
        `<div class="row"><div><strong>CPU</strong><small>${data.system.cpuPct == null ? '当前无权限或接口未提供' : `当前占用 ${data.system.cpuPct}%`}</small><div class="health-bar"><div class="health-fill fill-cpu" style="width:${data.system.cpuPct ?? 0}%"></div></div></div></div>`,
        `<div class="row"><div><strong>内存</strong><small>${data.system.memoryPct == null ? '当前无权限或接口未提供' : `当前占用 ${data.system.memoryPct}%`}</small><div class="health-bar"><div class="health-fill fill-mem" style="width:${data.system.memoryPct ?? 0}%"></div></div></div></div>`,
        `<div class="row"><div><strong>磁盘</strong><small>${data.system.diskPct == null ? '当前无权限或接口未提供' : `当前占用 ${data.system.diskPct}%`}</small><div class="health-bar"><div class="health-fill fill-disk" style="width:${data.system.diskPct ?? 0}%"></div></div></div></div>`,
        `<div class="row"><div><strong>状态</strong><small>${data.system.status === 'reachable' ? `已连到真实 OPNsense · 来源 ${data.system.metricsSource || 'unknown'}` : data.system.status === 'unreachable' ? '后端已配置但 OPNsense 不可达' : data.system.status === 'unknown' ? '接口已尝试但字段仍待映射' : '当前使用模拟数据'}</small></div><div>${systemStatusTag}</div></div>`
      ].join('');
    }

    async function loadWanChart() {
      const data = await fetchJSON('/dashboard/wan/timeseries?range=5m');
      document.getElementById('wan-chart-range').textContent = data.range || '5 分钟窗口';
      const canvas = document.getElementById('wan-canvas');
      const rx = data.points.map(p => ({ value: p.rx }));
      const tx = data.points.map(p => ({ value: p.tx }));
      if (data.points.length < 2) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#8ea3c7';
        ctx.font = '14px sans-serif';
        ctx.fillText('正在积累 WAN 流量样本…', 24, 32);
        return;
      }
      drawSeries(canvas, [rx, tx], ['#00e5ff', '#7c4dff']);
    }

    async function loadFirewallChart() {
      const data = await fetchJSON('/dashboard/firewall/states');
      document.getElementById('fw-current').textContent = `${data.activeStates}`;
      const canvas = document.getElementById('fw-canvas');
      const values = data.trend.map(p => ({ value: p.value }));
      drawSeries(canvas, [values], ['#ff4d6d']);
    }

    async function loadClients() {
      const data = await fetchJSON('/dashboard/clients/online');
      document.getElementById('clients-total').textContent = data.totalOnline;
      const clients = (data.clients || []).slice().sort((a, b) => (a.lastSeen || 0) - (b.lastSeen || 0)).slice(0, 8);
      document.getElementById('clients-list').innerHTML = clients.length ? clients.map(c => {
        const title = c.hostname && c.hostname !== c.ip ? shortText(c.hostname, 24) : shortText(c.vendor || c.ip, 24);
        const subtitle = [c.ip, c.interface || 'unknown', c.vendor ? shortText(c.vendor, 22) : null].filter(Boolean).join(' · ');
        const age = Math.max(1, Math.round(Date.now()/1000 - c.lastSeen));
        return `
          <div class="client-card">
            <div class="client-main">
              <strong>${title}</strong>
              <div class="client-meta">${subtitle}</div>
              <div class="client-meta">最近活跃 ${formatAge(age)}</div>
            </div>
            <div>${badge('在线', 'ok')}</div>
          </div>
        `;
      }).join('') : `<div class="row"><div><strong>暂无终端列表</strong><small>当前权限或接口未提供在线终端明细</small></div><div>${badge('待接入', 'dim')}</div></div>`;
    }

    async function loadVpn() {
      const data = await fetchJSON('/dashboard/vpn/online');
      document.getElementById('vpn-total').textContent = data.totalOnline;
      const rows = [
        `<div class="row"><div><strong>总在线人数</strong><small>VPN 当前总在线</small></div><div class="tag ok">${data.totalOnline}</div></div>`,
        `<div class="row"><div><strong>WireGuard</strong><small>在线 Peer</small></div><div class="tag">${data.providers.wireguard}</div></div>`,
        `<div class="row"><div><strong>OpenVPN</strong><small>在线 Client</small></div><div class="tag warn">${data.providers.openvpn}</div></div>`
      ];
      const peers = (data.peers || []).slice().sort((a, b) => peerStatusRank(a.status) - peerStatusRank(b.status)).slice(0, 4);
      peers.forEach(peer => {
        const statusType = peer.status === 'online' ? 'ok' : (peer.status === 'stale' ? 'warn' : 'dim');
        const ageText = peer.latestHandshakeAge == null ? '无握手' : formatAge(peer.latestHandshakeAge);
        const endpoint = shortText(peer.endpoint || '(none)', 28);
        rows.push(`<div class="row"><div><strong>${shortText(peer.name, 18)}</strong><small>${endpoint} · 最近握手 ${ageText}</small></div><div>${badge(peer.status, statusType)}</div></div>`);
      });
      document.getElementById('vpn-list').innerHTML = rows.join('');
    }

    async function boot() {
      try {
        await Promise.all([
          loadIntegrationStatus(),
          loadOverview(),
          loadWanChart(),
          loadFirewallChart(),
          loadClients(),
          loadVpn()
        ]);
      } catch (err) {
        console.error(err);
        document.getElementById('integration-text').textContent = '前后端通信失败，请检查 PulsePanel 服务状态。';
        document.getElementById('integration-badges').innerHTML = badge('通信失败', 'err');
      }
    }
    boot();
    setInterval(boot, 5000);
  </script>
</body>
</html>
